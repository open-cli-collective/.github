name: Homebrew tap publish (canonical + aliases)
description: >
  Publish the goreleaser-rendered canonical cask plus its manifest-declared
  alias casks to the Homebrew tap in ONE commit. goreleaser must run with
  skip_upload:true for the cask (asserted by the release preflight) so this
  step is the single writer — canonical and aliases land atomically.
inputs:
  canonical-cask-file:
    description: "path to the goreleaser-rendered canonical cask (.rb) in dist/"
    required: true
  canonical-token:
    description: "canonical cask token (manifest packages.homebrew.canonical_cask)"
    required: true
  alias-tokens:
    description: "space-separated alias cask tokens (manifest packages.homebrew.alias_casks); may be empty"
    required: false
    default: ""
  tap-repo:
    description: "owner/repo of the Homebrew tap"
    required: true
  cask-dir:
    description: "casks directory within the tap"
    required: false
    default: "Casks"
  tap-token:
    description: "token with write access to the tap (NOT GITHUB_TOKEN)"
    required: true
runs:
  using: composite
  steps:
    - id: publish
      shell: bash
      env:
        CANONICAL_FILE: ${{ inputs.canonical-cask-file }}
        CANONICAL_TOKEN: ${{ inputs.canonical-token }}
        ALIAS_TOKENS: ${{ inputs.alias-tokens }}
        TAP_REPO: ${{ inputs.tap-repo }}
        CASK_DIR: ${{ inputs.cask-dir }}
        TAP_TOKEN: ${{ inputs.tap-token }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        render="$ACTION_PATH/alias.sh"
        [ -f "$render" ] || { echo "::error::alias.sh not found at $render"; exit 1; }
        # pilot item (a): the canonical cask MUST be present in dist/ — a missing
        # one means goreleaser didn't render it (skip_upload misconfig or build
        # gap). Hard-fail rather than push a partial tap.
        [ -f "$CANONICAL_FILE" ] || { echo "::error::canonical cask not found in dist: $CANONICAL_FILE"; exit 1; }
        [ -n "$TAP_TOKEN" ] || { echo "::error::tap-token is required to publish to $TAP_REPO"; exit 1; }

        # Clone/push with the token via a credential helper, never embedded in
        # the remote URL — so a transient git failure can't print the token to
        # stderr before the Actions log masker redacts it.
        tmp="$(mktemp -d)"
        remote="https://github.com/${TAP_REPO}.git"
        # shellcheck disable=SC2016  # $TAP_TOKEN must expand when git runs the
        # helper subshell (env-inherited), NOT in this outer shell.
        helper='!f() { echo username=x-access-token; echo "password=${TAP_TOKEN}"; }; f'
        gitc() { git -c credential.helper= -c "credential.helper=$helper" "$@"; }
        gitc clone --depth 1 "$remote" "$tmp/tap"
        dest="$tmp/tap/$CASK_DIR"
        mkdir -p "$dest"

        # canonical: verbatim copy
        cp "$CANONICAL_FILE" "$dest/${CANONICAL_TOKEN}.rb"
        echo "rendered canonical: ${CANONICAL_TOKEN}.rb"
        # aliases: same artifact, only the cask stanza token renamed
        for a in $ALIAS_TOKENS; do
          bash "$render" render "$CANONICAL_FILE" "$CANONICAL_TOKEN" "$a" > "$dest/${a}.rb"
          echo "rendered alias: ${a}.rb"
        done

        cd "$tmp/tap"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add "$CASK_DIR"
        if git diff --cached --quiet; then
          echo "::notice::tap already up to date for $CANONICAL_TOKEN — nothing to commit"
          exit 0
        fi
        # one commit = canonical + every alias land together (atomicity)
        git commit -m "Update ${CANONICAL_TOKEN} cask (canonical + aliases)"
        gitc push origin HEAD
        echo "::notice::published ${CANONICAL_TOKEN} (+aliases) to $TAP_REPO"
