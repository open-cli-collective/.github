name: Go lint
description: Set up Go from go.mod and run golangci-lint. The golangci version is pinned here so a family-wide bump is one edit (ci.md §5/§7).
inputs:
  go-version-file:
    description: "go.mod path relative to working-directory"
    required: false
    default: go.mod
  working-directory:
    description: "Module root to lint"
    required: false
    default: "."
runs:
  using: composite
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version-file: ${{ inputs.working-directory }}/${{ inputs.go-version-file }}
    # A shared lint config is required; golangci defaults are non-conformant (repo-layout.md §5).
    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ ! -f .golangci.yml ] && [ ! -f .golangci.yaml ]; then
          echo "::error::no .golangci.yml in the module root — a shared lint config is required (repo-layout.md §5); golangci defaults are non-conformant"
          exit 1
        fi
    - uses: golangci/golangci-lint-action@v7
      with:
        version: v2.12.2
        working-directory: ${{ inputs.working-directory }}
