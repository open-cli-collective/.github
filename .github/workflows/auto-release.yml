name: Auto Release (reusable)

# Reusable workflow: on push to main, decide whether to cut a release and mint
# the tag. Identity (tag prefix + version file) comes from packaging/identity.yml
# via identity-check, so a repo declares it once. See cli-common release.md.
on:
  workflow_call:
    inputs:
      manifest-path:
        type: string
        default: packaging/identity.yml
      working-directory:
        type: string
        default: "."
      release-paths:
        # Go-CLI default (the whole family is Go). A non-Go caller must override.
        type: string
        default: "**.go,go.mod,go.sum,version.txt"
      tool-paths:
        type: string
        default: ""
      dry-run:
        type: boolean
        default: false
    secrets:
      tag-token:
        # optional so dry-run needs no secret; required at runtime for a real push
        required: false

# read-only: the tag push uses the dedicated tag-token via a credential helper,
# never GITHUB_TOKEN — so a compromised composite can't write to the repo.
permissions:
  contents: read

jobs:
  auto-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      # validate identity AND export the normalized manifest (single source of
      # tag prefix + version file). validate-and-export fails here if identity
      # drifted on main — don't mint a tag against a bad manifest.
      # NOTE: @v1 must be cut (rollout step #8) before any caller can use this
      # workflow; until then these action refs won't resolve.
      - id: identity
        uses: open-cli-collective/.github/actions/identity-check@v1
        with:
          manifest-path: ${{ inputs.manifest-path }}
          working-directory: ${{ inputs.working-directory }}
          mode: validate-and-export

      - id: meta
        shell: bash
        env:
          IDJSON: ${{ steps.identity.outputs.identity-json }}
          WD: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          prefix="$(printf '%s' "$IDJSON" | jq -r '.tag.prefix // "v"')"
          vfile="$(printf '%s' "$IDJSON" | jq -r '.version_file // "version.txt"')"
          version="$(tr -d ' \t\n\r' < "$WD/$vfile")"
          {
            echo "prefix=$prefix"
            echo "version-file=$vfile"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - id: gate
        uses: open-cli-collective/.github/actions/auto-release@v1
        with:
          release-paths: ${{ inputs.release-paths }}
          tool-paths: ${{ inputs.tool-paths }}
          version-file: ${{ steps.meta.outputs.version-file }}
          tag-prefix: ${{ steps.meta.outputs.prefix }}
          version: ${{ steps.meta.outputs.version }}
          run-number: ${{ github.run_number }}
          before-sha: ${{ github.event.before }}
          after-sha: ${{ github.sha }}
          commit-message: ${{ github.event.head_commit.message }}

      - name: Tag
        if: steps.gate.outputs.should-release == 'true'
        shell: bash
        env:
          TAG: ${{ steps.gate.outputs.tag }}
          DRY_RUN: ${{ inputs.dry-run }}
          TAG_TOKEN: ${{ secrets.tag-token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            echo "::notice::dry-run: would create tag $TAG at $SHA"
            exit 0
          fi
          # idempotent rerun: tag already at HEAD is fine; at another commit is a collision
          if existing="$(git rev-parse -q --verify "refs/tags/$TAG" 2>/dev/null)"; then
            if [ "$existing" = "$SHA" ]; then
              echo "::notice::tag $TAG already exists at $SHA — nothing to do"
              exit 0
            fi
            echo "::error::tag $TAG already exists at $existing, not $SHA (collision)"
            exit 1
          fi
          if [ -z "$TAG_TOKEN" ]; then
            echo "::error::tag-token secret is required for a non-dry-run release"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" "$SHA"
          # push with the dedicated token (NOT GITHUB_TOKEN, so release.yml
          # retriggers) via a credential helper — keeps the token out of the
          # remote URL so it can't leak into git's URL-bearing error output.
          git remote set-url origin "https://github.com/${REPO}.git"
          # shellcheck disable=SC2016  # $TAG_TOKEN must expand when git runs the
          # helper subshell (env-inherited), NOT in this outer shell — keeps it
          # out of the stored config value.
          git -c credential.helper= \
              -c 'credential.helper=!f() { echo username=x-access-token; echo "password=${TAG_TOKEN}"; }; f' \
              push origin "refs/tags/$TAG"
          echo "::notice::pushed tag $TAG"
